services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - odoo
      - --proxy-mode
    environment:
      - SERVICE_URL_ODOO_8069
      - HOST=db
      - "USER=${SERVICE_USER_POSTGRES:?Set SERVICE_USER_POSTGRES}"
      - "PASSWORD=${SERVICE_PASSWORD_POSTGRES:?Set SERVICE_PASSWORD_POSTGRES}"
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:8069
      interval: 10s
      timeout: 10s
      retries: 30
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  db:
    image: postgres:16.14-alpine
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    environment:
      - "POSTGRES_USER=${SERVICE_USER_POSTGRES:?Set SERVICE_USER_POSTGRES}"
      - "POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES:?Set SERVICE_PASSWORD_POSTGRES}"
      - POSTGRES_DB=postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d postgres
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  odoo-web-data:
  postgresql-data:
